<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #71c9ff;
            --primary-dark: #1e6f8f;
            --accent: #007aff;
            --bg: #f4f7fc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-light: #5b6e8c;
            --border: #e2edf2;
            --radius-xl: 28px;
            --radius-lg: 20px;
            --transition: all 0.25s ease;
        }

        body {
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.92);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* LOGIN SCREEN */
        #login-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(145deg, #7cd3ff 0%, #226f8f 100%);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(8px);
            padding: 36px 28px;
            border-radius: 40px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 30px 45px -15px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: scaleIn 0.4s ease;
        }

        .login-card h1 {
            font-weight: 800;
            font-size: 28px;
            color: var(--primary-dark);
            letter-spacing: -0.5px;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-dark);
        }

        .login-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border-radius: 24px;
            border: 1.5px solid var(--border);
            outline: none;
            font-size: 15px;
            font-weight: 500;
            background: white;
        }

        .login-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(113, 201, 255, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border-radius: 28px;
            border: none;
            background: var(--primary-dark);
            color: white;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
        }

        .btn-login:active {
            transform: scale(0.97);
        }

        /* APP HEADER */
        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 18px;
        }

        .header-title {
            font-weight: 800;
            font-size: 20px;
            color: var(--primary-dark);
            margin-bottom: 12px;
        }

        .search-bar {
            position: relative;
            margin-bottom: 18px;
        }

        .search-bar i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-dark);
        }

        .search-input {
            width: 100%;
            padding: 14px 14px 14px 48px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: white;
            font-size: 15px;
            font-weight: 500;
            outline: none;
        }

        /* TABS + MAQUINA FILTER */
        .filters-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 6px;
            scrollbar-width: thin;
        }

        .tab, .machine-tab {
            padding: 8px 18px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 40px;
            white-space: nowrap;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            cursor: pointer;
            transition: 0.2s;
        }

        .tab.active, .machine-tab.active {
            background: var(--primary-dark);
            color: white;
            border-color: var(--primary-dark);
        }

        .machine-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 6px;
        }

        /* GRID cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 20px;
            padding-bottom: 100px;
        }

        .card {
            background: var(--surface);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: 0.2s;
            animation: fadeIn 0.4s ease;
            cursor: pointer;
        }

        .card:active {
            transform: scale(0.97);
        }

        .img-container {
            width: 100%;
            aspect-ratio: 1/1;
            background: #f0f4f9;
            position: relative;
            overflow: hidden;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.4s;
        }

        .badge-qty {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            color: white;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 800;
        }

        .card-info {
            padding: 12px;
        }

        .card-wk {
            font-size: 10px;
            font-weight: 800;
            color: var(--primary-dark);
            text-transform: uppercase;
        }

        .card-code {
            font-size: 15px;
            font-weight: 800;
            color: var(--text);
            display: block;
            letter-spacing: -0.3px;
        }

        .card-desc {
            font-size: 11px;
            color: var(--text-light);
            margin: 5px 0;
            font-weight: 600;
            height: 34px;
            overflow: hidden;
        }

        .loc-tag {
            background: #eef2ff;
            color: var(--accent);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            display: inline-block;
        }

        /* DOCK */
        .dock {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 340px;
            background: #0f172aee;
            backdrop-filter: blur(20px);
            padding: 8px 12px;
            border-radius: 34px;
            display: flex;
            justify-content: space-around;
            z-index: 2000;
            box-shadow: 0 12px 25px -5px rgba(0, 0, 0, 0.4);
        }

        .dock-item {
            color: #9aa9bf;
            text-decoration: none;
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            transition: 0.2s;
            padding: 6px 12px;
            border-radius: 30px;
        }

        .dock-item.active {
            color: var(--primary);
            background: #1e2a3a;
        }

        .dock-item i {
            font-size: 24px;
            display: block;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            z-index: 4000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(6px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 380px;
            border-radius: 36px;
            padding: 28px 22px;
            animation: scaleIn 0.25s ease;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

</div>

        { "cod1": "HF 36A", "cod2": "78597", "desc": "DISCO DE FREIO MOBI", "tipo": "PECAS", "maquina": "MOBI", "qtd": 1000, "local": "A09", "imgUrl": "https://http2.mlstatic.com/D_NQ_NP_2X_861235-MLB89166218530_082025-F.webp" },
        { "cod1": "AL-209", "cod2": "117854", "desc": "CUBO DE RODA DIANTEIRO HILUX", "tipo": "PECAS", "maquina": "all", "qtd": 1000, "local": "A09", "imgUrl": "https://http2.mlstatic.com/D_NQ_NP_2X_956309-MLB97073446208_112025-F.webp" },
        { "cod1": "113106", "cod2": "113106", "desc": "ARTICULAÇÃO AUXILIAR HULIX", "tipo": "PECAS", "maquina": "HILUX", "qtd": 1000, "local": "A08", "imgUrl": "https://http2.mlstatic.com/D_NQ_NP_737282-MLA52601279908_112022-O.webp" },
        { "cod1": "130172", "cod2": "88957", "desc": "PINÇA DE FREIO HILUX", "tipo": "PECAS", "maquina": "HILUX", "qtd": 1000, "local": "A08", "imgUrl": "https://http2.mlstatic.com/D_NQ_NP_2X_727104-MLB92205027087_092025-F.webp" },
        { "cod1": "OFF", "cod2": "OFF", "desc": "PASTILHA PARA FREIO MOBI", "tipo": "PECAS", "maquina": "MOBI", "qtd": 1000, "local": "A07", "imgUrl": "" },
        { "cod1": "133497", "cod2": "OFF", "desc": "PASTILHA PARA FREIO L200", "tipo": "PECAS", "maquina": "L200", "qtd": 1000, "local": "A07", "imgUrl": "" },
        { "cod1": "CU26010/2", "cod2": "", "desc": "FILTRO AR CABINE", "tipo": "FILTRO", "maquina": "SAVEIRO", "qtd": 5, "local": "A03", "imgUrl": "" }
    ];
    
    // lista unica de máquinas para filtro
    const maquinasSet = new Set();
    ESTOQUE_RAW.forEach(item => {
        if (item.maquina && item.maquina.trim()) maquinasSet.add(item.maquina);
    });
    const MAQUINAS_LIST = Array.from(maquinasSet).sort();

    let currentFilterType = "Todos";
    let currentMachineFilter = "Todas"; 
    let searchTerm = "";

    function filterItems() {
        let filtered = [...ESTOQUE_RAW];
        if (searchTerm) {
            const term = searchTerm.toLowerCase();
            filtered = filtered.filter(i => 
                i.cod1.toLowerCase().includes(term) || 
                i.desc.toLowerCase().includes(term) || 
                (i.maquina && i.maquina.toLowerCase().includes(term))
            );
        }
        if (currentFilterType !== "Todos") {
            filtered = filtered.filter(i => i.tipo === currentFilterType);
        }
        if (currentMachineFilter !== "Todas") {
            filtered = filtered.filter(i => i.maquina === currentMachineFilter);
        }
        renderProducts(filtered);
    }

    function renderProducts(data) {
        const grid = document.getElementById('productGrid');
        if (!data.length) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px;">⚠️ Nenhum item encontrado.</div>`;
            return;
        }
        grid.innerHTML = data.map((item, idx) => `
            <div class="card" style="animation-delay: ${idx * 0.03}s" onclick="openItem('${item.cod1.replace(/'/g, "\\'")}')">
                <div class="img-container">
                    <div class="badge-qty">📦 ${item.qtd} un</div>
                    <img src="${item.imgUrl || 'https://placehold.co/400x400?text='+encodeURIComponent(item.cod1)}" 
                         onerror="this.src='https://placehold.co/400x400?text=Sem+imagem'">
                </div>
                <div class="card-info">
                    <span class="card-wk">🔧 ${item.cod2 || '---'}</span>
                    <span class="card-code">${item.cod1}</span>
                    <p class="card-desc">${item.desc.substring(0, 32)}${item.desc.length>32?'…':''}</p>
                    <span class="loc-tag">📍 ${item.local || 'N/I'}</span>
                </div>
            </div>
        `).join('');
    }

    function openItem(cod) {
        const item = ESTOQUE_RAW.find(i => i.cod1 === cod);
        if (!item) return;
        const modalDiv = document.getElementById('modalData');
        modalDiv.innerHTML = `
            <div style="text-align:center">
                <img src="${item.imgUrl || 'https://placehold.co/300x300?text='+item.cod1}" style="width:130px; height:130px; border-radius:20px; object-fit:cover; margin-bottom:12px;" 
                     onerror="this.src='https://placehold.co/300x300?text=Imagem'">
                <h3 style="color:var(--primary-dark);">${item.cod1}</h3>
                <p><strong>${item.desc}</strong></p>
                <div style="background:#f0f4f9; border-radius:24px; padding:12px; margin:15px 0; text-align:left;">
                    <div>🔖 Código aux: ${item.cod2 || '-'}</div>
                    <div>🏭 Máquina: ${item.maquina || 'Geral'}</div>
                    <div>📍 Local: ${item.local}</div>
                    <div>📦 Estoque: ${item.qtd} unidades</div>
                </div>
            </div>
        `;
        document.getElementById('itemModal').classList.add('active');
        saveToHistory(item);
    }

    function saveToHistory(item) {
        let history = JSON.parse(localStorage.getItem('rds_history') || '[]');
        history.unshift({ cod: item.cod1, desc: item.desc, local: item.local, time: new Date().toLocaleString(), maquina: item.maquina });
        if (history.length > 20) history.pop();
        localStorage.setItem('rds_history', JSON.stringify(history));
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('rds_history') || '[]');
        const container = document.getElementById('historyLog');
        container.innerHTML = history.map(h => `
            <div class="card" style="display:flex; align-items:center; gap:12px; padding:12px;">
                <i class="material-icons-round" style="background:#eef2ff; padding:8px; border-radius:50%;">history</i>
                <div style="flex:1"><strong>${h.cod}</strong><br><small>${h.desc.substring(0,35)}</small><br><small>${h.time}</small></div>
                <span class="loc-tag">${h.local || '-'}</span>
            </div>
        `).join('');
        if(history.length === 0) container.innerHTML = '<div class="card" style="padding:20px; text-align:center">Nenhuma consulta registrada.</div>';
    }

    function changeView(view, el) {
        document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('view-estoque').classList.add('hidden');
        document.getElementById('view-historico').classList.add('hidden');
        document.getElementById(`view-${view}`).classList.remove('hidden');
        if(view === 'historico') renderHistory();
    }

    function closeModal() { document.getElementById('itemModal').classList.remove('active'); }

    // Login handler
    function handleLogin() {
        const user = document.getElementById('user').value.toLowerCase().trim();
        const pass = document.getElementById('pass').value;
        if (USERS[user] === pass) {
            const loginDiv = document.getElementById('login-screen');
            loginDiv.style.opacity = '0';
            setTimeout(() => {
                loginDiv.classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                filterItems();
                renderMachineFilters();
            }, 300);
        } else {
            alert("❌ Acesso negado! Verifique usuário e senha.");
        }
    }

    function renderMachineFilters() {
        const container = document.getElementById('machineFilterContainer');
        container.innerHTML = `<div class="machine-tab ${currentMachineFilter === 'Todas' ? 'active' : ''}" data-machine="Todas">🏭 Todas</div>`;
        MAQUINAS_LIST.forEach(m => {
            container.innerHTML += `<div class="machine-tab ${currentMachineFilter === m ? 'active' : ''}" data-machine="${m.replace(/"/g, '&quot;')}">${m}</div>`;
        });
        document.querySelectorAll('.machine-tab').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.machine-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMachineFilter = btn.getAttribute('data-machine');
                filterItems();
            });
        });
    }

    // event listeners
    document.getElementById('mainSearch').addEventListener('input', (e) => {
        searchTerm = e.target.value;
        filterItems();
    });

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentFilterType = tab.getAttribute('data-filter');
            filterItems();
        });
    });

    window.openItem = openItem;
    window.closeModal = closeModal;
    window.changeView = changeView;
    window.handleLogin = handleLogin;
</script>
</body>
</html>
