<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Acesso ao Site</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0f4c75, #3282b8);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.35);
            padding: 40px;
            border-radius: 12px;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 15px;
            font-size: 26px;
        }

        p {
            font-size: 16px;
            margin-bottom: 25px;
        }

        .whatsapp-btn {
            display: inline-block;
            background-color: #25d366;
            color: #ffffff;
            text-decoration: none;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .whatsapp-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        footer {
            margin-top: 20px;
            font-size: 13px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Acesso ao Site</h1>
        <p>
            Para ter acesso novamente ao site, entre em contato com
            <strong>Kaiky RDS</strong>.
        </p>

        <a class="whatsapp-btn"
           href="https://wa.me/5531998771435"
           target="_blank">
            Entrar em contato pelo WhatsApp
        </a>

        <footer>
            © 2026 • Suporte e acesso
        </footer>
    </div>

</body>
</html>
